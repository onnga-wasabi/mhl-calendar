name: Build & publish MHL calendars

on:
  schedule:
    - cron: "17 */6 * * *"   # 6時間ごと（UTC）。サイト更新に追従する
  workflow_dispatch: {}       # 手動実行も可
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate .ics + feed.json + index.html
        env:
          # Worker をデプロイしたら Settings→Variables に FEED_URL を登録すると購読パネルが有効化される
          FEED_URL: ${{ vars.FEED_URL }}
        run: |
          # 公開先 URL を index.html に埋め込む
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          python3 mhl_calendar.py --out site --base-url "$BASE_URL" --feed-url "$FEED_URL"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
